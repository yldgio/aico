name: ci

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  test:
    name: test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache: true
      - name: vet
        run: go vet ./...
      - name: test
        run: go test ./...
      - name: smoke test (binary)
        run: |
          go build -o aico .
          ./aico --version
          ./aico run pi /tmp --dry-run
          ./aico run copilot-cli /tmp --dry-run
          ./aico run codex /tmp --dry-run
        shell: bash

  smoke:
    name: docker smoke test
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache: true
      - name: build aico + image
        run: |
          go build -o aico .
          docker build -t aico-agents:latest images/
      - name: smoke — each agent's actual command starts
        run: |
          # Test the EXACT command composition (image ENTRYPOINT + our CMD).
          # This catches issues like the Node docker-entrypoint.sh prepending
          # 'node' when command -v fails on a relative path.
          echo "── pi"
          docker run --rm aico-agents:latest pi --version
          echo "── opencode"
          docker run --rm aico-agents:latest opencode --version || true
          echo "── copilot (via entrypoint script)"
          docker run --rm aico-agents:latest /usr/local/bin/copilot-entrypoint.sh --version
          echo "── codex"
          docker run --rm aico-agents:latest codex --version || true
          echo "── claude"
          docker run --rm aico-agents:latest claude --version || true
      - name: smoke — copilot keyring round-trip
        run: |
          docker run --rm aico-agents:latest sh -c '
            eval $(dbus-launch --sh-syntax 2>/dev/null)
            eval $(gnome-keyring-daemon --start --components=secrets 2>/dev/null) || true
            echo -n "test-token" | secret-tool store --label="ci" service copilot account ci
            RESULT=$(secret-tool lookup service copilot account ci)
            [ "$RESULT" = "test-token" ] && echo "KEYRING: OK ✓" || { echo "KEYRING: FAILED"; exit 1; }
          '

  build:
    name: cross-compile
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache: true
      - name: build (all targets)
        run: |
          for t in linux/amd64 linux/arm64 darwin/amd64 darwin/arm64 windows/amd64 windows/arm64; do
            GOOS=${t%/*} GOARCH=${t#*/} go build -o /dev/null .
          done

  release:
    name: release
    needs: [test, build, smoke]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache: true
      - uses: goreleaser/goreleaser-action@v7
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
